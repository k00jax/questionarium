<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Questionarium</title>
<style>
:root { color-scheme: light; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
  background-attachment: fixed;
}
.container { max-width: 750px; width: 100%; background: #ffffff; border-radius: 24px; box-shadow: 0 24px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; }

/* ── Header ── */
.header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px 28px; text-align: center; color: white; position: relative; }
.mascot { font-size: 48px; display: inline-block; animation: float 3s ease-in-out infinite; cursor: pointer; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.header h1 { font-size: 26px; font-weight: 800; letter-spacing: -.5px; }
.header .subtitle { font-size: 13px; opacity: .85; font-style: italic; margin-top: 2px; }
.header-ra { position: absolute; top: 14px; right: 16px; padding: 5px 14px !important; font-size: 11px !important; }

/* ── Player Bar ── */
.player-bar { display: flex; align-items: center; gap: 12px; padding: 12px 24px; background: #f8f9fa; border-bottom: 1px solid #e9ecef; font-size: 13px; flex-wrap: wrap; }
.player-bar .p-avatar { font-size: 28px; }
.player-bar .p-info { flex: 1; min-width: 120px; }
.player-bar .p-name { font-weight: 700; color: #212529; }
.player-bar .p-level { font-size: 11px; color: #764ba2; font-weight: 600; }
.player-bar .xp-wrap { width: 120px; }
.player-bar .xp-label { font-size: 10px; color: #adb5bd; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
.player-bar .xp-bar-outer { height: 6px; background: #e9ecef; border-radius: 3px; overflow: hidden; }
.player-bar .xp-bar-inner { height: 100%; background: linear-gradient(90deg,#f093fb,#f5576c); border-radius: 3px; transition: width .6s; }
.player-bar .badge-count { font-size: 11px; color: #6c757d; white-space: nowrap; }
.player-bar .btn-sm { font-size: 11px; padding: 4px 10px; border-radius: 8px; border: 1px solid #dee2e6; background: white; cursor: pointer; color: #6c757d; font-family: inherit; }
.player-bar .btn-sm:hover { background: #f1f3f5; }
.readaloud-toggle { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 20px; border: 2px solid #dee2e6; background: white; cursor: pointer; font-size: 12px; font-weight: 700; font-family: inherit; color: #6c757d; transition: all .3s; white-space: nowrap; }
.readaloud-toggle.active { background: #f3f0ff; border-color: #764ba2; color: #764ba2; animation: pulseBorder 2s infinite; }
.readaloud-toggle .ra-icon { font-size: 16px; }
@keyframes pulseBorder { 0%,100%{box-shadow:0 0 0 0 rgba(118,75,162,.3)} 50%{box-shadow:0 0 0 8px rgba(118,75,162,0)} }
.readaloud-indicator { position: fixed; top: 8px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg,#667eea,#764ba2); color: white; padding: 6px 18px; border-radius: 20px; font-size: 12px; font-weight: 700; z-index: 100; pointer-events: none; animation: raFadeIn .4s ease-out; }
@keyframes raFadeIn { 0%{opacity:0;transform:translateX(-50%) translateY(-10px)} 100%{opacity:1;transform:translateX(-50%) translateY(0)} }

/* ── Card Area ── */
.card-area { padding: 32px; min-height: 280px; position: relative; }

/* ── Welcome Screen ── */
.welcome { text-align: center; }
.welcome h2 { font-size: 22px; color: #212529; margin-bottom: 6px; }
.welcome .welcome-sub { font-size: 14px; color: #6c757d; margin-bottom: 24px; }
.welcome .input-group { margin-bottom: 24px; }
.welcome label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: #764ba2; font-weight: 700; margin-bottom: 8px; }
.welcome input[type=text] {
  width: 100%; max-width: 320px; padding: 12px 16px; border: 2px solid #e9ecef; border-radius: 12px;
  font-size: 16px; font-family: inherit; text-align: center; outline: none; transition: border-color .2s;
}
.welcome input[type=text]:focus { border-color: #764ba2; }
.avatar-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 28px; }
.avatar-option { width: 64px; height: 64px; border-radius: 16px; border: 3px solid #e9ecef; background: #f8f9fa; font-size: 32px; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; position: relative; }
.avatar-option:hover { border-color: #764ba2; transform: scale(1.08); background: #f3f0ff; }
.avatar-option.selected { border-color: #764ba2; background: #f3f0ff; box-shadow: 0 0 0 4px rgba(118,75,162,.15); }
.avatar-option .avatar-label { position: absolute; bottom: -18px; font-size: 10px; color: #6c757d; white-space: nowrap; }
.btn-primary { padding: 14px 40px; background: linear-gradient(135deg,#667eea,#764ba2); color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .2s; }
.btn-primary:hover { transform: scale(1.04); box-shadow: 0 6px 20px rgba(118,75,162,.3); }
.btn-primary:disabled { opacity: .5; transform: none; cursor: not-allowed; box-shadow: none; }
.btn-secondary { padding: 12px 28px; background: white; color: #764ba2; border: 2px solid #764ba2; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .2s; }
.btn-secondary:hover { background: #f3f0ff; }
.load-save-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }

/* ── Realm Map ── */
.realm-map { text-align: center; }
.realm-map h3 { font-size: 18px; color: #212529; margin-bottom: 4px; }
.realm-map .map-sub { font-size: 13px; color: #6c757d; margin-bottom: 20px; }
.realm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }
.realm-card { padding: 16px; border-radius: 14px; border: 2px solid #e9ecef; background: white; cursor: pointer; transition: all .2s; text-align: left; position: relative; overflow: hidden; }
.realm-card:hover:not(.locked) { border-color: #764ba2; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.08); }
.realm-card.locked { opacity: .45; cursor: not-allowed; filter: grayscale(.3); }
.realm-card.completed { border-color: #51cf66; background: #f6fff6; }
.realm-card .realm-icon { font-size: 28px; margin-bottom: 4px; }
.realm-card .realm-name { font-weight: 700; font-size: 14px; color: #212529; }
.realm-card .realm-count { font-size: 11px; color: #adb5bd; }
.realm-card .realm-check { position: absolute; top: 8px; right: 10px; font-size: 18px; }
.realm-card .realm-lock { position: absolute; top: 10px; right: 12px; font-size: 14px; }
.map-footer { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }

/* ── Question Screen ── */
.realm-banner { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: #764ba2; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.realm-banner .banner-icon { font-size: 20px; }
.question-text { font-size: 19px; line-height: 1.5; color: #212529; font-weight: 700; margin-bottom: 20px; padding: 14px 18px; background: #f8f9fa; border-radius: 12px; cursor: pointer; transition: background .2s; }
.question-text:hover { background: #e9ecef; }
.question-text .speaker-hint { font-size: 10px; color: #adb5bd; margin-top: 4px; font-weight: 400; }
.answers { display: flex; flex-direction: column; gap: 8px; }
.answer-btn { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border: 2px solid #e9ecef; border-radius: 14px; background: white; cursor: pointer; font-size: 14px; line-height: 1.4; color: #495057; transition: all .2s; text-align: left; font-family: inherit; }
.answer-btn:hover { border-color: #764ba2; background: #f8f0ff; transform: translateX(4px); }
.answer-btn:active { transform: translateX(2px) scale(.98); }
.answer-letter { width: 30px; height: 30px; border-radius: 10px; background: linear-gradient(135deg,#667eea,#764ba2); color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; flex-shrink: 0; }
.answer-text { flex: 1; }
.answer-speaker { font-size: 16px; cursor: pointer; padding: 4px; border-radius: 8px; background: none; border: none; opacity: .4; flex-shrink: 0; transition: opacity .2s; }
.answer-speaker:hover { opacity: 1; }

/* ── Reaction ── */
.reaction-card { text-align: center; padding: 16px 12px; animation: popIn .4s cubic-bezier(.175,.885,.32,1.275); }
@keyframes popIn { 0%{transform:scale(.9);opacity:0} 100%{transform:scale(1);opacity:1} }
.reaction-emoji { font-size: 60px; margin-bottom: 8px; }
.reaction-title { font-size: 20px; font-weight: 800; color: #212529; margin-bottom: 6px; }
.reaction-msg { font-size: 14px; color: #6c757d; line-height: 1.5; margin-bottom: 12px; cursor: pointer; padding: 8px 12px; background: #f8f9fa; border-radius: 10px; display: inline-block; }
.reaction-thought { font-size: 13px; color: #764ba2; font-style: italic; margin-bottom: 16px; line-height: 1.5; cursor: pointer; padding: 6px 12px; display: inline-block; }
.xp-gain { font-size: 14px; font-weight: 700; color: #f5576c; margin-bottom: 12px; animation: floatUp .6s ease-out; }
@keyframes floatUp { 0%{transform:translateY(10px);opacity:0} 100%{transform:translateY(0);opacity:1} }

/* ── Realm Complete ── */
.realm-complete { text-align: center; }
.realm-complete .rc-icon { font-size: 56px; margin-bottom: 8px; }
.realm-complete h3 { font-size: 20px; color: #212529; margin-bottom: 4px; }
.realm-complete .rc-stats { font-size: 13px; color: #6c757d; margin-bottom: 16px; }
.badge-unlock { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; background: linear-gradient(135deg,#fff3bf,#ffd43b); border-radius: 14px; font-weight: 700; font-size: 14px; color: #664d00; margin: 8px 0; animation: popIn .5s cubic-bezier(.175,.885,.32,1.275); }

/* ── Final Screen ── */
.final-card { text-align: center; padding: 24px 16px; }
.final-emoji { font-size: 72px; margin-bottom: 12px; animation: float 2s ease-in-out infinite; }
.final-title { font-size: 26px; font-weight: 800; color: #212529; margin-bottom: 8px; }
.final-msg { font-size: 15px; color: #6c757d; line-height: 1.6; margin-bottom: 20px; max-width: 480px; margin-left: auto; margin-right: auto; }
.final-stats { display: flex; justify-content: center; gap: 28px; margin-bottom: 20px; flex-wrap: wrap; }
.final-stat { text-align: center; min-width: 70px; }
.final-stat-val { font-size: 32px; font-weight: 800; background: linear-gradient(135deg,#667eea,#764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.final-stat-label { font-size: 11px; color: #adb5bd; text-transform: uppercase; letter-spacing: 1px; }
.badge-gallery { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; }
.badge-chip { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge-chip.earned { background: #fff3bf; color: #664d00; }
.badge-chip.locked { background: #e9ecef; color: #adb5bd; opacity: .6; }

/* ── Toast ── */
.toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 999; display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none; }
.toast { padding: 12px 24px; border-radius: 14px; font-weight: 700; font-size: 14px; animation: toastIn .4s ease-out, toastOut .4s 2.2s ease-in forwards; box-shadow: 0 8px 30px rgba(0,0,0,.2); pointer-events: auto; }
.toast.levelup { background: linear-gradient(135deg,#667eea,#764ba2); color: white; }
.toast.badge { background: linear-gradient(135deg,#ffd43b,#fab005); color: #664d00; }
.toast.info { background: #212529; color: white; }
@keyframes toastIn { 0%{transform:translateY(-20px);opacity:0} 100%{transform:translateY(0);opacity:1} }
@keyframes toastOut { 0%{opacity:1} 100%{opacity:0;transform:translateY(-10px)} }

/* ── Confetti ── */
.confetti-piece { position: fixed; z-index: 1000; pointer-events: none; animation: confettiFall 2.5s ease-in forwards; }
@keyframes confettiFall { 0%{transform:translateY(-10vh) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }

/* ── Skip ── */
.skip-area { text-align: center; padding-bottom: 16px; }
.skip-btn { background: none; border: none; color: #adb5bd; font-size: 12px; cursor: pointer; font-family: inherit; padding: 6px 14px; }
.skip-btn:hover { color: #6c757d; }

/* ── Responsive ── */
@media(max-width:500px){
  .container{border-radius:16px} .header{padding:16px} .header h1{font-size:20px}
  .question-text{font-size:16px} .card-area{padding:20px} .player-bar{padding:10px 16px;font-size:11px;gap:8px}
  .answer-btn{font-size:13px;padding:10px 12px} .realm-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="mascot" id="headerMascot">🦉</div>
    <h1>The Questionarium</h1>
    <div class="subtitle">Where wondering is the whole point</div>
    <button class="readaloud-toggle header-ra" id="raToggle" onclick="toggleReadAloud()" title="Read-aloud mode: hover over buttons to hear them (or press R)">
      <span class="ra-icon">🔇</span> Read Aloud
    </button>
  </div>
  <div class="player-bar" id="playerBar" style="display:none">
    <span class="p-avatar" id="pAvatar"></span>
    <div class="p-info"><div class="p-name" id="pName"></div><div class="p-level" id="pLevel"></div></div>
    <div class="xp-wrap"><div class="xp-label">XP</div><div class="xp-bar-outer"><div class="xp-bar-inner" id="xpBar"></div></div></div>
    <span class="badge-count" id="badgeCount"></span>
    <button class="btn-sm" onclick="saveAndQuit()" title="Save & go to map">🗺️ Map</button>
    <button class="btn-sm" onclick="saveGame();showToast('💾 Game saved!','info')">💾 Save</button>
  </div>
  <div class="card-area" id="cardArea"></div>
  <div class="skip-area" id="skipArea"><button class="skip-btn" onclick="skipQuestion()">Skip →</button></div>
</div>
<div class="toast-container" id="toastContainer"></div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// GAME DATA
// ══════════════════════════════════════════════════════════════════════════════

const AVATARS = [
  {emoji:"🦉", name:"Owlis", desc:"The Wise Guide"},
  {emoji:"🦊", name:"Fennex", desc:"The Clever Trickster"},
  {emoji:"🐱", name:"Whiskers", desc:"The Curious Explorer"},
  {emoji:"🐉", name:"Ember", desc:"The Brave Heart"},
  {emoji:"🤖", name:"Byte", desc:"The Logic Master"},
  {emoji:"🦄", name:"Sparkle", desc:"The Dream Weaver"},
  {emoji:"🐼", name:"Bumble", desc:"The Kind Soul"},
  {emoji:"🐙", name:"Inky", desc:"The Deep Thinker"},
];

const LEVELS = [
  {level:1, name:"Curious Newcomer", xp:0},
  {level:2, name:"Question Asker", xp:60},
  {level:3, name:"Thought Explorer", xp:140},
  {level:4, name:"Wonder Wanderer", xp:260},
  {level:5, name:"Idea Adventurer", xp:420},
  {level:6, name:"Mind Mapper", xp:620},
  {level:7, name:"Deep Diver", xp:860},
  {level:8, name:"Wisdom Seeker", xp:1140},
  {level:9, name:"Philosophy Friend", xp:1460},
  {level:10, name:"Wonder Champion", xp:1820},
];

const BADGES = [
  {id:"first_step", icon:"🌟", name:"First Wonder", desc:"Answer your first question", check:(gs)=>gs.questionsAnswered>=1},
  {id:"seeker", icon:"🔍", name:"Seeker", desc:"Answer 5 questions", check:(gs)=>gs.questionsAnswered>=5},
  {id:"deep_thinker", icon:"🧠", name:"Deep Thinker", desc:"Answer 15 questions", check:(gs)=>gs.questionsAnswered>=15},
  {id:"philosopher", icon:"🏛️", name:"Philosopher", desc:"Answer 25 questions", check:(gs)=>gs.questionsAnswered>=25},
  {id:"completionist", icon:"🏆", name:"Completionist", desc:"Answer all questions", check:(gs)=>gs.questionsAnswered>=ALL_QUESTIONS.length},
  {id:"realm_walker", icon:"🌍", name:"Realm Walker", desc:"Complete your first realm", check:(gs)=>Object.values(gs.realmProgress).some(v=>v>=realmQuestionCount(v))},
  {id:"cartographer", icon:"🗺️", name:"Cartographer", desc:"Complete ALL 12 realms", check:(gs)=>Object.keys(gs.realmProgress).length===12&&Object.values(gs.realmProgress).every(v=>v>=realmQuestionCount(v))},
  {id:"heart_of_gold", icon:"💛", name:"Heart of Gold", desc:"Choose kind/compassionate answers 8+ times", check:(gs)=>gs.kindAnswers>=8},
  {id:"rebel", icon:"🎨", name:"Creative Spirit", desc:"Choose unconventional answers 8+ times", check:(gs)=>gs.rebelAnswers>=8},
  {id:"night_owl", icon:"🦉", name:"Night Owl", desc:"Play a question late at night or early morning", check:(gs)=>{const h=new Date().getHours();return h>=22||h<5;}},
  {id:"speed_of_thought", icon:"⚡", name:"Speed of Thought", desc:"Answer 3 questions quickly in one session", check:(gs)=>gs.fastAnswers>=3},
  {id:"wonder_champion", icon:"👑", name:"Wonder Champion", desc:"Earn 8+ badges", check:(gs)=>gs.earnedBadges.length>=8},
];

const REALMS = [
  {id:"fairness", name:"Fairness Frontier", icon:"⚖️", color:"#667eea", required:0},
  {id:"reality", name:"Reality Rift", icon:"🌌", color:"#764ba2", required:0},
  {id:"happiness", name:"Happiness Hollow", icon:"🌈", color:"#f5576c", required:1},
  {id:"friendship", name:"Friendship Forest", icon:"🌳", color:"#51cf66", required:0},
  {id:"identity", name:"Identity Island", icon:"🏝️", color:"#ff922b", required:1},
  {id:"secrets", name:"Secret Sanctuary", icon:"🔐", color:"#845ef7", required:1},
  {id:"trust", name:"Trust Tower", icon:"🏰", color:"#339af0", required:2},
  {id:"time", name:"Time Tangle", icon:"⏳", color:"#f06595", required:2},
  {id:"nature", name:"Nature Nook", icon:"🌿", color:"#20c997", required:2},
  {id:"dream", name:"Dream Depths", icon:"💤", color:"#7950f2", required:3},
  {id:"courage", name:"Courage Canyon", icon:"⛰️", color:"#f59f00", required:3},
  {id:"mystery", name:"Mystery Manor", icon:"🏚️", color:"#495057", required:3},
];

function realmQuestionCount(realmId) {
  return SCENARIOS.filter(s=>s.realm===realmId).length;
}

const SCENARIOS = [
  // ── FAIRNESS FRONTIER ──
  {realm:"fairness", category:"FAIRNESS LAB",
   question:"A wizard offers to make you THE BEST at everything... but everyone else becomes slightly worse at everything they do. Deal?",
   answers:[
     {letter:"A",text:"Take the deal! Being the best at everything sounds amazing.",reaction:"🌟",title:"The Champion",msg:"You know what you want and you go for it. That's powerful.",thought:"If everyone else got worse, would 'the best' still mean anything? Is being great only special because other people are great too?",kind:false,rebel:false},
     {letter:"B",text:"No way. I don't want to make everyone else worse just so I can shine.",reaction:"💛",title:"The Big Heart",msg:"You care about other people, even strangers. That's a superpower all by itself.",thought:"Would it still be the right choice if one of those people was your best friend? What if it was someone you don't like?",kind:true,rebel:false},
     {letter:"C",text:"Can I be the best at just ONE thing instead? Like, really good at making pizza?",reaction:"🍕",title:"The Negotiator",msg:"You found a third option! That's what philosophers do — question the question itself.",thought:"Why did the wizard only give two choices? In real life, are most choices really just A or B?",kind:false,rebel:true},
     {letter:"D",text:"What does 'best' even MEAN if everyone else gets worse? That's not being best — it's just everyone else being worse.",reaction:"🔍",title:"The Word Detective",msg:"You looked at the words themselves before answering.",thought:"How many arguments happen because people mean different things by the same word? Fair. Best. Good. What do those even mean?",kind:false,rebel:true},
   ]},
  {realm:"fairness", category:"FAIRNESS LAB",
   question:"A machine gives everyone in the world EXACTLY the same amount of everything — money, food, toys, everything. Is that fair?",
   answers:[
     {letter:"A",text:"Yes! Equal shares for everyone is the definition of fair.",reaction:"📏",title:"The Equalizer",msg:"You believe fair means everyone gets the same. That's clean and simple.",thought:"But what if someone works harder? What if someone NEEDS more? Is equal always fair?",kind:false,rebel:false},
     {letter:"B",text:"No — people who work harder should get more. Equal isn't always fair.",reaction:"💪",title:"The Merit Believer",msg:"You believe effort should matter. That feels right to a lot of people.",thought:"But what about people who CAN'T work as hard? Is it their fault? What about people born with advantages?",kind:false,rebel:false},
     {letter:"C",text:"Fair isn't everyone getting the SAME — it's everyone getting what they NEED.",reaction:"🤲",title:"The Need Seer",msg:"You distinguished between equality and equity. That's wisdom beyond your years.",thought:"Who decides what people 'need'? And what if what someone needs costs more than what someone else needs?",kind:true,rebel:false},
     {letter:"D",text:"The machine should give EXTRA to people who share what they get with others.",reaction:"🔄",title:"The Generosity Engineer",msg:"You want to reward kindness. That's building fairness ON TOP of equality.",thought:"But then the machine is judging people's character. Is it okay for machines to make moral decisions?",kind:true,rebel:true},
   ]},
  {realm:"fairness", category:"FAIRNESS LAB",
   question:"You can save ONLY ONE: a museum filled with priceless art from every culture, or a hospital with 100 patients inside. Which do you save?",
   answers:[
     {letter:"A",text:"The hospital. Human lives matter more than any object, no matter how beautiful.",reaction:"🏥",title:"The Life Guardian",msg:"You put human life above everything else. That's a powerful moral compass.",thought:"But what if the art inside represents the entire history and identity of a culture? Is culture worth less than individual lives?",kind:true,rebel:false},
     {letter:"B",text:"The museum. Art preserves who we ARE. Without it, we forget ourselves.",reaction:"🎭",title:"The Culture Keeper",msg:"You believe identity and meaning matter as much as survival. That's a brave position.",thought:"Would the 100 patients agree? Can you make that choice FOR them?",kind:false,rebel:true},

  // ── REALITY RIFT ──
  {realm:"reality", category:"REALITY CHECK",
   question:"Your friend says they have an invisible pet dragon. It can breathe fire... but the fire is ALSO invisible. How would you figure out if the dragon is actually real?",
   answers:[
     {letter:"A",text:"Try to touch it! If I can feel it, it's real, even if I can't see it.",reaction:"🖐️",title:"The Hands-On Thinker",msg:"You trust what you can touch and feel. That's called empiricism!",thought:"But what about things you can't touch, like gravity or love or thoughts? Are those real?",kind:false,rebel:false},
     {letter:"B",text:"Throw water on it! If there's an invisible dragon, the water would splash on SOMETHING.",reaction:"💦",title:"The Experiment Designer",msg:"You invented a test! That's what scientists do — look for evidence.",thought:"What if the dragon was also waterproof? How many tests before you'd decide it wasn't real?",kind:false,rebel:false},
     {letter:"C",text:"If you can't prove it's NOT real... maybe it IS real? I believe my friend.",reaction:"🤝",title:"The Trust Builder",msg:"You chose to believe your friend. Trust is one of the most important things humans have.",thought:"But should we always believe people we trust? What if your friend truly believes the dragon is real — does that make it real?",kind:true,rebel:false},
     {letter:"D",text:"What if the dragon only exists when someone is thinking about it? Like, it's real in our imagination?",reaction:"🌈",title:"The Dream Weaver",msg:"You're asking whether something can be real in one way but not another.",thought:"Is a story real? Is a dream real? Is a feeling real? Are there different kinds of real?",kind:false,rebel:true},
   ]},
  {realm:"reality", category:"REALITY CHECK",
   question:"Everyone in the world suddenly believes the sky is green. They all point up and say 'look at that beautiful green sky.' You still see blue. Are they wrong?",

     {letter:"A",text:"They're wrong. The sky IS blue. Facts don't change just because people believe something else.",reaction:"📐",title:"The Fact Defender",msg:"You stand with truth even when you're the only one. That's courage.",thought:"But how do you KNOW your blue is the real blue? What if YOU'RE the one seeing it wrong?",kind:false,rebel:false},

     {letter:"C",text:"Maybe 'green' just MEANS 'that color up there' now. Words can change meaning.",reaction:"📖",title:"The Word Watcher",msg:"You realized the question might be about language, not reality.",thought:"If everyone used the word 'green' to mean blue, would they be wrong — or would the language have changed?",kind:false,rebel:true},
     {letter:"D",text:"I'd investigate WHY everyone suddenly changed. Something weird is going on!",reaction:"🔎",title:"The Detective",msg:"You didn't answer — you asked a better question. WHY did this happen?",thought:"Sometimes the most important question isn't 'what is true?' but 'why do people believe what they believe?'",kind:false,rebel:true},

  {realm:"reality", category:"REALITY CHECK",
   question:"You dream an ENTIRE LIFETIME — growing up, making friends, falling in love, growing old. Then you wake up. Was any of it real?",

     {letter:"B",text:"Yes — it was real TO ME while it happened. That makes it real in the only way that matters.",reaction:"💭",title:"The Experience Keeper",msg:"You believe your own experience is what defines reality. That's powerful.",thought:"If something is only real to you, is it real at all? What's the difference between real and 'real to you'?",kind:false,rebel:true},
     {letter:"C",text:"The PEOPLE in the dream weren't real, but what I LEARNED from the dream IS real.",reaction:"🎓",title:"The Lesson Taker",msg:"You found the real inside the unreal — the wisdom you gained.",thought:"Can something fake teach you something true? Can you learn real lessons from made-up stories?",kind:false,rebel:false},
     {letter:"D",text:"What if THIS life is also a dream, and I haven't woken up yet?",reaction:"🌌",title:"The Deep Questioner",msg:"You turned the question inside out! Philosophers have been asking this for thousands of years.",thought:"How would you know if THIS was a dream? What test could you do to prove you're awake right now?",kind:false,rebel:true},

  // ── HAPPINESS HOLLOW ──
  {realm:"happiness", category:"HAPPINESS DILEMMA",
   question:"If you could press a button that makes EVERYONE happy forever... but nobody could EVER change their mind about ANYTHING again. Would you press it?",
   answers:[
     {letter:"A",text:"Press it! Happy forever for everyone sounds like the best possible world.",reaction:"😊",title:"The Joy Maximizer",msg:"You want everyone to be happy. That's beautiful.",thought:"But if nobody can change their mind, how would we learn new things? Would we be stuck with whatever we believed on button-press day forever?",kind:true,rebel:false},
     {letter:"B",text:"DON'T press it. Changing your mind is how you grow. Being stuck forever sounds like a prison.",reaction:"🌱",title:"The Growth Mind",msg:"You value freedom and growth over comfort. That's brave.",thought:"Is happiness worth anything if you didn't choose it? If a robot makes you smile by zapping your brain, is that real happiness?",kind:false,rebel:false},
     {letter:"C",text:"Can I press it HALFWAY? Everybody gets a happiness boost but can still learn and grow?",reaction:"⚖️",title:"The Balance Finder",msg:"You want both! Happiness AND growth. You're looking for the middle path.",thought:"Are there things in life where you can't have both? Times when you have to choose between feeling good and doing the right thing?",kind:false,rebel:true},
     {letter:"D",text:"Are people REALLY happy if they can't choose to be sad? Maybe you need sad to understand happy.",reaction:"🌓",title:"The Deep Diver",msg:"You asked whether happiness makes sense without sadness.",thought:"Can you know what warm means if you've never felt cold? What if ALL feelings need their opposite to make sense?",kind:false,rebel:true},
   ]},
  {realm:"happiness", category:"HAPPINESS DILEMMA",
   question:"A pill makes you feel perfectly content — not euphoric, just... satisfied. With everything. Your life, your choices, your future. Would you take it every day?",
   answers:[

     {letter:"C",text:"I'd take it on BAD days but not on good days. Best of both worlds!",reaction:"☀️",title:"The Mood Manager",msg:"You want control over when to feel what. That's self-awareness.",thought:"Would the bad days still feel bad if you knew you could escape them anytime?",kind:false,rebel:true},
     {letter:"D",text:"Is contentment from a pill REAL contentment? Or am I just... drugged?",reaction:"💊",title:"The Authenticity Check",msg:"You asked whether the SOURCE of a feeling matters. That's a very deep question.",thought:"If a feeling feels exactly the same whether it comes from a pill or from your life, does the source matter?",kind:false,rebel:true},

  {realm:"happiness", category:"HAPPINESS DILEMMA",
   question:"You can erase all your SAD memories. Every disappointment, every loss, every heartbreak — gone. Would your life be better?",
   answers:[

     {letter:"B",text:"No — my sad memories are part of who I am. They shaped me. I'd lose pieces of myself.",reaction:"🧩",title:"The Whole Self",msg:"You accept ALL of yourself — even the painful parts. That's self-love.",thought:"Is there a difference between 'shaped by sadness' and 'defined by sadness'? Can you heal WITHOUT forgetting?",kind:false,rebel:true},
     {letter:"C",text:"I'd keep the LESSON but erase the PAIN. Remember what I learned, not how much it hurt.",reaction:"📝",title:"The Editor",msg:"You want to keep the wisdom without the wound. That's smart.",thought:"But can you really separate a lesson from the experience that taught it? Does wisdom work without the emotion?",kind:false,rebel:true},
     {letter:"D",text:"I'd erase OTHER people's sad memories. Let ME carry the sadness so they don't have to.",reaction:"🛡️",title:"The Protector",msg:"You'd rather carry the weight yourself than see others hurt. That's extraordinary kindness.",thought:"But is it right to decide for other people what memories they keep?",kind:true,rebel:false},

  // ── FRIENDSHIP FOREST ──

  // ── IDENTITY ISLAND ──
  {realm:"identity", category:"IDENTITY PUZZLE",
   question:"You bury your favorite sneaker in the backyard. You dig it up 10 YEARS later — dirty, faded, full of holes. Is it the SAME sneaker or a DIFFERENT one?",
   answers:[
     {letter:"A",text:"Same sneaker! It's made of the exact same atoms. Nothing was added or removed.",reaction:"👟",title:"The Atom Counter",msg:"You believe what something IS comes down to what it's MADE OF.",thought:"But humans replace almost ALL their atoms every few years. Are you a different person than 7 years ago?",kind:false,rebel:false},
     {letter:"B",text:"It's a DIFFERENT sneaker. It changed over time. Things are defined by what they're like RIGHT NOW.",reaction:"⏳",title:"The Present Focuser",msg:"You care about what something is in THIS moment.",thought:"If you're different now than as a baby, are you a different person? When did baby-you become now-you?",kind:false,rebel:false},
     {letter:"C",text:"It's BOTH. Same sneaker, different CONDITION. Like how you're the same person even when you change.",reaction:"🔄",title:"The Both-And Thinker",msg:"You found a way to hold two truths at once. Not a contradiction!",thought:"What ELSE in life is 'both'? Are you the same person you were yesterday AND a different one?",kind:false,rebel:true},
     {letter:"D",text:"NEITHER. The REAL sneaker is the MEMORY of wearing it. Physical stuff was never what made it yours.",reaction:"💭",title:"The Meaning Maker",msg:"What makes something important isn't atoms — it's what it MEANS to you.",thought:"If meaning is what matters, does anything have meaning without someone to care about it?",kind:false,rebel:true},
   ]},
  {realm:"identity", category:"IDENTITY PUZZLE",
   question:"If you swapped brains with your worst enemy — your memories in their body, their memories in yours — who would YOU be?",
   answers:[
     {letter:"A",text:"I'd be ME, because my memories and personality are what make me who I am.",reaction:"🧠",title:"The Mind Keeper",msg:"You believe your identity lives in your mind, not your body.",thought:"But what about your body's instincts? Your reflexes? The way your body FEELS things? Don't those shape you too?",kind:false,rebel:false},

     {letter:"D",text:"I wouldn't do it! The question is too weird. Some things you just don't mess with.",reaction:"🙅",title:"The Boundary Setter",msg:"You know when a question goes somewhere you don't want to follow. That's self-awareness.",thought:"Are there questions we SHOULDN'T ask? Or is every question worth exploring?",kind:false,rebel:false},

  {realm:"identity", category:"IDENTITY PUZZLE",
   question:"Everyone starts calling you by a completely different name. After 5 years, even your parents use the new name. Is your OLD name still your 'real' name?",

     {letter:"D",text:"My REAL name is whatever I CHOOSE to call myself. Nobody else gets to decide.",reaction:"✊",title:"The Self-Namer",msg:"You own your identity. It's not given — it's chosen.",thought:"At what age should someone get to choose their own name? Their own identity? Is it ever TOO early?",kind:false,rebel:true},
   ]},

const ALL_QUESTIONS = SCENARIOS; // alias for badge checks

// ══════════════════════════════════════════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════════════════════════════════════════

let GS = {
  name: "",
  avatar: 0, // index into AVATARS
  xp: 0,
  questionsAnswered: 0,
  currentRealm: null, // realm ID being played
  currentQIndex: 0,   // index within current realm's questions
  realmProgress: {},  // {realmId: questionsAnsweredInRealm}
  earnedBadges: [],
  kindAnswers: 0,
  rebelAnswers: 0,
  fastAnswers: 0,
  fastAnswerTimer: null,
  totalAnswers: {},   // {scenarioIndex: answerIndex}
  questionOrder: {},  // {realmId: [shuffled indices]}
  activeRealmQuestions: [], // questions for current realm session
  sessionStart: null,
};

function resetGS() {
  GS = {
    name: "",
    avatar: 0,
    xp: 0,
    questionsAnswered: 0,
    currentRealm: null,
    currentQIndex: 0,
    realmProgress: {},
    earnedBadges: [],
    kindAnswers: 0,
    rebelAnswers: 0,
    fastAnswers: 0,
    fastAnswerTimer: null,
    totalAnswers: {},
    questionOrder: {},
    activeRealmQuestions: [],
    sessionStart: Date.now(),
  };
}

function currentLevel() {
  let lvl = LEVELS[0];
  for (const l of LEVELS) { if (GS.xp >= l.xp) lvl = l; }
  return lvl;
}

function xpForNextLevel() {
  const cl = currentLevel();
  const idx = LEVELS.indexOf(cl);
  return idx < LEVELS.length - 1 ? LEVELS[idx + 1].xp : cl.xp;
}

function xpProgress() {
  const cl = currentLevel();
  const next = xpForNextLevel();
  if (next === cl.xp) return 100;
  return Math.min(100, Math.round(((GS.xp - cl.xp) / (next - cl.xp)) * 100));
}

function realmForId(id) { return REALMS.find(r=>r.id===id); }
function questionsForRealm(realmId) { return SCENARIOS.filter(s=>s.realm===realmId); }

function completedRealms() {
  return Object.entries(GS.realmProgress).filter(([rid, count]) => {
    return count >= realmQuestionCount(rid);
  }).map(([rid]) => rid);
}

function isRealmUnlocked(realm) {
  if (realm.required === 0) return true;
  return completedRealms().length >= realm.required;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ══════════════════════════════════════════════════════════════════════════════
// SAVE / LOAD
// ══════════════════════════════════════════════════════════════════════════════

function saveGame() {
  const data = {
    name: GS.name,
    avatar: GS.avatar,
    xp: GS.xp,
    questionsAnswered: GS.questionsAnswered,
    realmProgress: GS.realmProgress,
    earnedBadges: GS.earnedBadges,
    kindAnswers: GS.kindAnswers,
    rebelAnswers: GS.rebelAnswers,
    totalAnswers: GS.totalAnswers,
    questionOrder: GS.questionOrder,
  };
  localStorage.setItem('questionarium_save', JSON.stringify(data));
}

function loadGame() {
  const raw = localStorage.getItem('questionarium_save');
  if (!raw) return false;
  try {
    const data = JSON.parse(raw);
    GS.name = data.name || "";
    GS.avatar = data.avatar || 0;
    GS.xp = data.xp || 0;
    GS.questionsAnswered = data.questionsAnswered || 0;
    GS.realmProgress = data.realmProgress || {};
    GS.earnedBadges = data.earnedBadges || [];
    GS.kindAnswers = data.kindAnswers || 0;
    GS.rebelAnswers = data.rebelAnswers || 0;
    GS.totalAnswers = data.totalAnswers || {};
    GS.questionOrder = data.questionOrder || {};
    GS.sessionStart = Date.now();
    return true;
  } catch(e) { return false; }
}

function hasSave() {
  return !!localStorage.getItem('questionarium_save');
}

function deleteSave() {
  localStorage.removeItem('questionarium_save');
}

function saveAndQuit() {
  saveGame();
  GS.currentRealm = null;
  renderRealmMap();
}

// ══════════════════════════════════════════════════════════════════════════════
// BADGES & LEVELING
// ══════════════════════════════════════════════════════════════════════════════

function checkBadges() {
  const newlyEarned = [];
  for (const badge of BADGES) {
    if (GS.earnedBadges.includes(badge.id)) continue;
    try {
      if (badge.check(GS)) {
        GS.earnedBadges.push(badge.id);
        newlyEarned.push(badge);
      }
    } catch(e) {}
  }
  return newlyEarned;
}

function awardXP(amount) {
  const oldLevel = currentLevel().level;
  GS.xp += amount;
  const newLevel = currentLevel().level;
  saveGame();
  if (newLevel > oldLevel) {
    setTimeout(() => showToast(`⬆️ Level Up! You're now a ${currentLevel().name}!`, 'levelup'), 300);
    confetti();
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════════════════════════════════════

function showToast(msg, type) {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function confetti() {
  const colors = ['#f5576c','#667eea','#764ba2','#f093fb','#ffd43b','#51cf66','#ff922b','#20c997'];
  for (let i = 0; i < 50; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.top = -(Math.random() * 20) + 'px';
    piece.style.width = (Math.random() * 10 + 6) + 'px';
    piece.style.height = (Math.random() * 10 + 6) + 'px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
    piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
    piece.style.animationDelay = Math.random() * .5 + 's';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 3500);
  }
}

function updatePlayerBar() {
  const bar = document.getElementById('playerBar');
  if (!GS.name) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  document.getElementById('pAvatar').textContent = AVATARS[GS.avatar].emoji;
  document.getElementById('pName').textContent = GS.name;
  const lvl = currentLevel();
  document.getElementById('pLevel').textContent = `Level ${lvl.level} — ${lvl.name}`;
  document.getElementById('xpBar').style.width = xpProgress() + '%';
  document.getElementById('badgeCount').textContent = `🏅 ${GS.earnedBadges.length}/${BADGES.length}`;
  document.getElementById('headerMascot').textContent = AVATARS[GS.avatar].emoji;
}

// AUDIO ENGINE & READ-ALOUD
// ══════════════════════════════════════════════════════════════════════════════

const TTS_SERVER = "http://localhost:8942";
let ttsServerAvailable = false;
let currentAudio = null;
let readAloudMode = false;
let raHoverTimeout = null;
let lastRaSpoken = '';
let audioQueue = [];
let queueProcessing = false;

async function detectTTSServer() {
  try {
    const resp = await fetch(`${TTS_SERVER}/health`, { signal: AbortSignal.timeout(1500) });
    if (resp.ok) {
      ttsServerAvailable = true;
      const info = await resp.text();
      console.log("🎙️ TTS server found:", info.trim());
      return true;
    }
  } catch(e) {}
  ttsServerAvailable = false;
  console.log("🔊 TTS server not found — using browser speech");
  return false;
}

function speak(text) {
  if (!text) return;
  if (ttsServerAvailable) {
    speakAndrew(text);
  } else {
    speakBrowser(text);
  }
}

function speakAndrew(text) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  const enc = encodeURIComponent(text);
  const a = new Audio(`${TTS_SERVER}/speak?text=${enc}`);
  currentAudio = a;
  a.play().catch(() => {});
  a.onended = () => { currentAudio = null; };
  return a;
}

function queueAndrew(text) {
  // Queue non-critical speech (like read-aloud hovers) so they don't stomp each other
  audioQueue.push(text);
  processQueue();
}

async function processQueue() {
  if (queueProcessing || audioQueue.length === 0) return;
  queueProcessing = true;
  while (audioQueue.length > 0) {
    const text = audioQueue.shift();
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    const enc = encodeURIComponent(text);
    const a = new Audio(`${TTS_SERVER}/speak?text=${enc}`);
    currentAudio = a;
    try {
      await a.play();
      await new Promise(r => { a.onended = r; a.onerror = r; });
    } catch(e) {}
    currentAudio = null;
  }
  queueProcessing = false;
}

function speakBrowser(text) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.9; u.pitch = 1.05;
    const voices = speechSynthesis.getVoices();
    const good = voices.find(v => v.name.includes('Google') || v.name.includes('Natural') || v.name.includes('Daniel') || v.name.includes('Samantha'));
    if (good) u.voice = good;
    u.onend = () => { currentAudio = null; };
    speechSynthesis.speak(u);
  }
}

function toggleReadAloud() {
  readAloudMode = !readAloudMode;
  const btn = document.getElementById('raToggle');
  if (readAloudMode) {
    btn.classList.add('active');
    btn.querySelector('.ra-icon').textContent = '🔊';
    btn.innerHTML = btn.innerHTML.replace('Read Aloud', 'Reading Aloud');
    const modeLabel = ttsServerAvailable ? 'Andrew voice' : 'browser voice';
    showToast(`🔊 Read-aloud mode ON — hover to hear (${modeLabel})`, 'info');
    setupReadAloudListeners();
    // Announce mode
    speak("Read-aloud mode activated.");
  } else {
    btn.classList.remove('active');
    btn.querySelector('.ra-icon').textContent = '🔇';
    btn.innerHTML = btn.innerHTML.replace('Reading Aloud', 'Read Aloud');
    teardownReadAloudListeners();
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    window.speechSynthesis?.cancel();
    audioQueue = [];
    queueProcessing = false;
  }
}

function getSpeakableText(el) {
  // Walk up from the hovered element to find a meaningful label
  let target = el;
  // Check specific selectors in priority order
  const selectors = [
    {sel:'.answer-btn', get: (e) => {
      const letter = e.querySelector('.answer-letter')?.textContent || '';
      const text = e.querySelector('.answer-text')?.textContent || '';
      return `Answer ${letter}: ${text}`;
    }},
    {sel:'.realm-card:not(.locked)', get: (e) => {
      const name = e.querySelector('.realm-name')?.textContent || '';
      const count = e.querySelector('.realm-count')?.textContent || '';
      return `${name}. ${count}.`;
    }},
    {sel:'.question-text', get: (e) => e.textContent.replace(/🔊.*$/,'').trim()},
    {sel:'.reaction-msg', get: (e) => e.textContent.replace(/^🔊\s*/,'').trim()},
    {sel:'.reaction-thought', get: (e) => e.textContent.replace(/^🔊\s*/,'').trim()},
    {sel:'.continue-btn', get: (e) => e.textContent.trim()},
    {sel:'.btn-primary', get: (e) => e.textContent.trim()},
    {sel:'.btn-secondary', get: (e) => e.textContent.trim()},
    {sel:'.btn-sm', get: (e) => e.textContent.replace(/[🗺️💾🔄📂]/g,'').trim() || e.title},
    {sel:'.realm-banner', get: (e) => e.textContent.trim()},
    {sel:'.avatar-option', get: (e) => {
      const label = e.querySelector('.avatar-label')?.textContent || '';
      return label ? `Avatar: ${label}` : '';
    }},
    {sel:'input[type=text]', get: (e) => {
      const label = document.querySelector('label')?.textContent || '';
      return label ? `${label} field` : 'Text input field';
    }},
    {sel:'.skip-btn', get: (e) => 'Skip this question'},
    {sel:'.readaloud-toggle', get: (e) => readAloudMode ? 'Turn read-aloud off' : 'Turn read-aloud on'},
  ];

  for (const {sel, get} of selectors) {
    const match = target.closest(sel);
    if (match) {
      const text = get(match);
      if (text && text.trim()) return text.trim();
      return null;
    }
  }
  // Fallback: if the element itself or its parent is a button
  const btn = target.closest('button');
  if (btn) {
    const t = btn.textContent.replace(/[🔊🗺️💾🔄📂🏆🔇]/g,'').trim();
    return t || btn.title || btn.getAttribute('aria-label') || 'Button';
  }
  return null;
}

function onReadAloudHover(e) {
  if (!readAloudMode) return;
  const text = getSpeakableText(e.target);
  if (!text || text === lastRaSpoken) return;

  clearTimeout(raHoverTimeout);
  raHoverTimeout = setTimeout(() => {
    lastRaSpoken = text;
    if (ttsServerAvailable) {
      // Cancel any current browser speech, then queue
      window.speechSynthesis?.cancel();
      queueAndrew(text);
    } else {
      speakBrowser(text);
    }
  }, 400); // 400ms debounce — speak only after hovering steadily
}

function setupReadAloudListeners() {
  document.addEventListener('mouseover', onReadAloudHover, true);
}

function teardownReadAloudListeners() {
  document.removeEventListener('mouseover', onReadAloudHover, true);
  clearTimeout(raHoverTimeout);
  lastRaSpoken = '';
}

// Clean up speech when leaving the game
document.addEventListener('mouseout', (e) => {
  if (readAloudMode && !e.relatedTarget) {
    clearTimeout(raHoverTimeout);
    audioQueue = [];
    queueProcessing = false;
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  }
}, true);

// ══════════════════════════════════════════════════════════════════════════════
// SCREEN RENDERERS
// ══════════════════════════════════════════════════════════════════════════════

function renderWelcome() {
  updatePlayerBar();
  document.getElementById('skipArea').style.display = 'none';
  const hasExistingSave = hasSave();
  document.getElementById('cardArea').innerHTML = `
    <div class="welcome">
      <h2>Welcome to The Questionarium!</h2>
      <p class="welcome-sub">A place where there are no wrong answers — only bigger questions.</p>
      <div class="input-group">
        <label>What's your name, Wonderer?</label>
        <input type="text" id="nameInput" placeholder="Type your name..." maxlength="24" value="${escHtml(GS.name)}" autofocus>
      </div>
      <label>Choose your guide</label>
      <div class="avatar-grid">
        ${AVATARS.map((a,i)=>`
          <div class="avatar-option${i===GS.avatar?' selected':''}" onclick="selectAvatar(${i})" title="${a.name} — ${a.desc}">
            ${a.emoji}
            <span class="avatar-label">${a.name}</span>
          </div>`).join('')}
      </div>
      <button class="btn-primary" id="startBtn" onclick="startAdventure()">Begin Your Adventure ✨</button>
      ${hasExistingSave ? `
      <div class="load-save-row" style="margin-top:12px">
        <button class="btn-secondary" onclick="loadAndContinue()">📂 Continue Journey</button>
        <button class="btn-secondary" style="border-color:#e03131;color:#e03131" onclick="if(confirm('Delete your saved game?')){deleteSave();renderWelcome();}">🗑️ New Game</button>
      </div>` : ''}
    </div>`;

  const input = document.getElementById('nameInput');
  if (input) {
    input.addEventListener('input', () => {
      GS.name = input.value.trim();
      document.getElementById('startBtn').disabled = !GS.name;
    });
    document.getElementById('startBtn').disabled = !GS.name;
  }
}

function selectAvatar(index) {
  GS.avatar = index;
  document.querySelectorAll('.avatar-option').forEach((el,i) => el.classList.toggle('selected', i===index));
}

function startAdventure() {
  const input = document.getElementById('nameInput');
  if (input) GS.name = input.value.trim();
  if (!GS.name) return;
  saveGame();
  updatePlayerBar();
  // Track fast answers per session
  GS.fastAnswers = 0;
  GS.fastAnswerTimer = Date.now();
  GS.sessionStart = Date.now();
  renderRealmMap();
}

function loadAndContinue() {
  if (loadGame()) {
    updatePlayerBar();
    renderRealmMap();
  }
}

function renderRealmMap() {
  updatePlayerBar();
  document.getElementById('skipArea').style.display = 'none';
  const completed = completedRealms();
  const allComplete = completed.length === REALMS.length;

  if (allComplete) {
    renderFinal();
    return;
  }

  document.getElementById('cardArea').innerHTML = `
    <div class="realm-map">
      <h3>🗺️ The Realms of Wonder</h3>
      <p class="map-sub">Explore philosophical worlds. Complete realms to unlock new ones. ${completed.length}/${REALMS.length} realms completed.</p>
      <div class="realm-grid">
        ${REALMS.map(r=>{
          const done = (GS.realmProgress[r.id]||0) >= realmQuestionCount(r.id);
          const unlocked = isRealmUnlocked(r);
          const progress = GS.realmProgress[r.id]||0;
          const total = realmQuestionCount(r.id);
          return `
          <div class="realm-card ${done?'completed':''} ${!unlocked?'locked':''}" onclick="${unlocked?`enterRealm('${r.id}')`:'void(0)'}">
            <span class="realm-icon">${r.icon}</span>
            <div class="realm-name">${r.name}</div>
            <div class="realm-count">${done?'✅ Complete':progress+'/'+total+' questions'}</div>
            ${done?'<span class="realm-check">✅</span>':''}
            ${!unlocked?`<span class="realm-lock">🔒</span>`:''}
          </div>`;
        }).join('')}
      </div>
      <div class="map-footer">
        <button class="btn-secondary" onclick="saveGame();showToast('💾 Game saved!','info')">💾 Save</button>
        <button class="btn-primary" onclick="renderFinal()">🏆 View Progress</button>
      </div>
    </div>`;
}

function enterRealm(realmId) {
  const realm = realmForId(realmId);
  GS.currentRealm = realmId;
  GS.currentQIndex = 0;

  // Get questions not yet answered, or shuffle all
  const allQ = questionsForRealm(realmId);
  const answered = GS.totalAnswers;
  const answeredInRealm = allQ.filter((_, i) => {
    const globalIdx = SCENARIOS.indexOf(allQ[i]);
    return globalIdx in answered;
  });

  // If all answered, reshuffle all for replay; otherwise show unanswered first then answered
  let unanswered = allQ.filter((_, i) => !(SCENARIOS.indexOf(allQ[i]) in answered));
  if (unanswered.length === 0) unanswered = shuffle(allQ);
  else unanswered = shuffle(unanswered);

  GS.activeRealmQuestions = unanswered;
  GS.currentQIndex = 0;

  renderQuestion();
}

function renderQuestion() {
  updatePlayerBar();
  document.getElementById('skipArea').style.display = 'block';
  const qi = GS.currentQIndex;
  const questions = GS.activeRealmQuestions;

  if (!questions || qi >= questions.length) {
    // Realm complete
    realmFinished();
    return;
  }

  const q = questions[qi];
  const realm = realmForId(q.realm);

  document.getElementById('cardArea').innerHTML = `
    <div class="realm-banner">
      <span class="banner-icon">${realm.icon}</span>
      ${realm.name} · Question ${qi+1} of ${questions.length}
    </div>
    <div class="question-text" onclick="speak('${escHtml(q.question)}')">
      ${q.question}
      <div class="speaker-hint">🔊 Click to hear aloud</div>
    </div>
    <div class="answers">
      ${q.answers.map((a,i)=>`
        <button class="answer-btn" onclick="pickAnswer(${i})">
          <span class="answer-letter">${a.letter}</span>
          <span class="answer-text">${a.text}</span>
          <button class="answer-speaker" onclick="event.stopPropagation();speak('${escHtml(a.text)}')" title="Hear aloud">🔊</button>
        </button>`).join('')}
    </div>`;
}

function pickAnswer(i) {
  const q = GS.activeRealmQuestions[GS.currentQIndex];
  const a = q.answers[i];
  const globalIdx = SCENARIOS.indexOf(q);

  // Track answer
  GS.totalAnswers[globalIdx] = i;
  GS.questionsAnswered++;
  GS.realmProgress[GS.currentRealm] = (GS.realmProgress[GS.currentRealm] || 0) + 1;

  // Track answer style
  if (a.kind) GS.kindAnswers++;
  if (a.rebel) GS.rebelAnswers++;

  // Fast answer tracking
  if (GS.fastAnswerTimer) {
    const elapsed = Date.now() - GS.fastAnswerTimer;
    if (elapsed < 15000) GS.fastAnswers++;
    GS.fastAnswerTimer = Date.now();
  }

  // Award XP
  const xpGain = 10 + Math.floor(Math.random() * 6); // 10-15 XP
  awardXP(xpGain);

  // Check badges
  const newBadges = checkBadges();
  for (const b of newBadges) {
    setTimeout(() => showToast(`${b.icon} Badge earned: ${b.name}!`, 'badge'), 500);
  }

  updatePlayerBar();
  document.getElementById('skipArea').style.display = 'none';

  // Speak reaction
  speak(a.msg);
  setTimeout(() => speak(a.thought), 4000);

  document.getElementById('cardArea').innerHTML = `
    <div class="reaction-card">
      <div class="reaction-emoji">${a.reaction}</div>
      <div class="reaction-title">${a.title}</div>
      <div class="reaction-msg" onclick="speak('${escHtml(a.msg)}')">🔊 ${a.msg}</div>
      <div class="reaction-thought" onclick="speak('${escHtml(a.thought)}')">🔊 💡 ${a.thought}</div>
      <div class="xp-gain">+${xpGain} XP</div>
      ${newBadges.length ? newBadges.map(b=>`<div class="badge-unlock">${b.icon} ${b.name} Unlocked!</div>`).join('') : ''}
      <button class="continue-btn btn-primary" onclick="nextInRealm()">
        ${GS.currentQIndex + 1 < GS.activeRealmQuestions.length ? 'Next Question →' : 'Complete Realm 🎉'}
      </button>
    </div>`;
}

function nextInRealm() {
  GS.currentQIndex++;
  if (GS.currentQIndex >= GS.activeRealmQuestions.length) {
    realmFinished();
  } else {
    renderQuestion();
  }
}

function skipQuestion() {
  GS.currentQIndex++;
  if (GS.currentQIndex >= GS.activeRealmQuestions.length) {
    realmFinished();
  } else {
    renderQuestion();
  }
}

function realmFinished() {
  const realm = realmForId(GS.currentRealm);
  const completed = (GS.realmProgress[GS.currentRealm] || 0);
  const total = realmQuestionCount(GS.currentRealm);
  const newBadges = checkBadges();

  for (const b of newBadges) {
    setTimeout(() => showToast(`${b.icon} Badge earned: ${b.name}!`, 'badge'), 500);
  }
  updatePlayerBar();
  saveGame();
  document.getElementById('skipArea').style.display = 'none';

  // Confetti for realm completion
  if (completed >= total) confetti();

  document.getElementById('cardArea').innerHTML = `
    <div class="realm-complete">
      <div class="rc-icon">${realm.icon}</div>
      <h3>${completed >= total ? 'Realm Complete!' : 'Realm Progress'}</h3>
      <div class="rc-stats">${completed}/${total} questions explored in ${realm.name}</div>
      ${newBadges.length ? newBadges.map(b=>`<div class="badge-unlock">${b.icon} ${b.name} Unlocked!</div>`).join('') : ''}
      ${completed >= total ? '<p style="color:#51cf66;font-weight:700;margin:8px 0">🌟 All questions in this realm explored!</p>' : ''}
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        ${completed < total ? `<button class="btn-primary" onclick="enterRealm('${GS.currentRealm}')">Continue ${realm.name} →</button>` : ''}
        <button class="btn-secondary" onclick="renderRealmMap()">🗺️ Realm Map</button>
      </div>
    </div>`;
}

function renderFinal() {
  updatePlayerBar();
  document.getElementById('skipArea').style.display = 'none';
  const completed = completedRealms();
  const allComplete = completed.length === REALMS.length;
  const lvl = currentLevel();
  const msgs = [
    "You did something most grown-ups forget how to do. You asked questions — not to find the one right answer, but to explore what's possible. Keep doing that forever.",
    "Every great scientist, every great artist, every great human started exactly where you are right now: wondering. Never stop.",
    "The most powerful sentence in the world isn't 'I know.' It's 'I wonder.' And you just proved you're a wonder champion.",
    "You traveled through realms of fairness, reality, happiness, and more — and came back with something more valuable than answers: better questions.",
  ];

  document.getElementById('cardArea').innerHTML = `
    <div class="final-card">
      <div class="final-emoji">${AVATARS[GS.avatar].emoji}</div>
      <div class="final-title">${allComplete ? "You're a Wonder Champion!" : "Your Journey So Far"}</div>
      <div class="final-msg">${msgs[Math.floor(Math.random()*msgs.length)]}</div>
      <div class="final-stats">
        <div class="final-stat"><div class="final-stat-val">${GS.questionsAnswered}</div><div class="final-stat-label">Questions</div></div>
        <div class="final-stat"><div class="final-stat-val">${GS.xp}</div><div class="final-stat-label">Total XP</div></div>
        <div class="final-stat"><div class="final-stat-val">Lv.${lvl.level}</div><div class="final-stat-label">${lvl.name}</div></div>
        <div class="final-stat"><div class="final-stat-val">${completed.length}/${REALMS.length}</div><div class="final-stat-label">Realms</div></div>
      </div>
      <h4 style="font-size:14px;color:#212529;margin-bottom:12px">🏅 Badges (${GS.earnedBadges.length}/${BADGES.length})</h4>
      <div class="badge-gallery">
        ${BADGES.map(b=>{
          const earned = GS.earnedBadges.includes(b.id);
          return `<div class="badge-chip ${earned?'earned':'locked'}" title="${b.desc}">${b.icon} ${b.name}</div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        ${!allComplete ? `<button class="btn-primary" onclick="renderRealmMap()">🗺️ Continue Exploring</button>` : ''}
        <button class="btn-secondary" onclick="renderRealmMap()">🗺️ Realm Map</button>
        <button class="btn-primary" style="background:linear-gradient(135deg,#f093fb,#f5576c)" onclick="if(confirm('Start a completely new game? Your current save will be lost.')){deleteSave();resetGS();renderWelcome();}">🔄 New Game</button>
      </div>
    </div>`;

  if (allComplete) confetti();
}

// ══════════════════════════════════════════════════════════════════════════════
// UTILITY
// ══════════════════════════════════════════════════════════════════════════════

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════════════

if ('speechSynthesis' in window) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

// Detect edge-tts server, then boot the game
detectTTSServer().then(found => {
  if (found) {
    // Update the toggle label to show Andrew voice
    const toggle = document.getElementById('raToggle');
    if (toggle) {
      toggle.title = 'Read-aloud mode: Andrew voice reads buttons on hover';
    }
  }

  if (hasSave()) {
    loadGame();
    updatePlayerBar();
    renderRealmMap();
  } else {
    resetGS();
    renderWelcome();
  }
});
</script>
