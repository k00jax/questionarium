<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Questionarium</title>
<style>
:root { color-scheme: light; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
}
.container { max-width: 700px; width: 100%; background: white; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,.3); overflow: hidden; }
.header { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); padding: 24px 32px; text-align: center; color: white; }
.mascot { font-size: 52px; margin-bottom: 4px; animation: bounce 2s infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.header h1 { font-size: 28px; font-weight: 800; }
.header p { font-size: 14px; opacity: .9; font-style: italic; }
.stats { display: flex; justify-content: space-around; padding: 16px 24px; background: #f8f9fa; border-bottom: 1px solid #e9ecef; font-size: 14px; font-weight: 600; color: #495057; }
.stat { display: flex; align-items: center; gap: 6px; } .stat-icon { font-size: 18px; }
.progress-wrap { padding: 0 24px 12px; background: #f8f9fa; }
.progress-bar { height: 6px; background: #e9ecef; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg,#f093fb,#f5576c); border-radius: 3px; transition: width .5s; }
.card-area { padding: 28px 32px; min-height: 200px; }
.scenario-label { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: #764ba2; font-weight: 700; margin-bottom: 12px; }
.question-text { font-size: 20px; line-height: 1.5; color: #212529; font-weight: 700; margin-bottom: 24px; cursor: pointer; padding: 12px 16px; background: #f8f9fa; border-radius: 12px; transition: background .2s; }
.question-text:hover { background: #e9ecef; }
.speaker-hint { font-size: 11px; color: #adb5bd; margin-top: 4px; font-weight: 400; }
.answers { display: flex; flex-direction: column; gap: 10px; }
.answer-btn { display: flex; align-items: flex-start; gap: 12px; padding: 14px 18px; border: 2px solid #e9ecef; border-radius: 14px; background: white; cursor: pointer; font-size: 15px; line-height: 1.5; color: #495057; transition: all .2s; text-align: left; font-family: inherit; }
.answer-btn:hover { border-color: #764ba2; background: #f8f0ff; transform: translateX(4px); }
.answer-btn:active { transform: translateX(2px) scale(.99); }
.answer-letter { width: 32px; height: 32px; border-radius: 10px; background: linear-gradient(135deg,#667eea,#764ba2); color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; flex-shrink: 0; }
.speaker-mini { margin-left: auto; font-size: 16px; cursor: pointer; padding: 4px; border-radius: 8px; flex-shrink: 0; background: none; border: none; opacity: .5; transition: opacity .2s; }
.speaker-mini:hover { opacity: 1; }
.voice-badge { display: inline-block; font-size: 10px; background: #e9ecef; padding: 2px 8px; border-radius: 10px; margin-left: 6px; color: #6c757d; }
.reaction-card { text-align: center; padding: 24px 20px; }
.reaction-emoji { font-size: 64px; margin-bottom: 12px; }
.reaction-title { font-size: 22px; font-weight: 800; color: #212529; margin-bottom: 8px; }
.reaction-msg { font-size: 15px; color: #6c757d; line-height: 1.5; margin-bottom: 16px; cursor: pointer; }
.reaction-thought { font-size: 14px; color: #764ba2; font-style: italic; margin-bottom: 20px; line-height: 1.5; cursor: pointer; }
.continue-btn { padding: 14px 40px; background: linear-gradient(135deg,#667eea,#764ba2); color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; transition: transform .2s; }
.continue-btn:hover { transform: scale(1.05); }
.skip-area { text-align: center; padding-bottom: 20px; }
.skip-btn { background: none; border: none; color: #adb5bd; font-size: 13px; cursor: pointer; font-family: inherit; padding: 8px 16px; }
.skip-btn:hover { color: #6c757d; }
.final-card { text-align: center; padding: 40px 32px; }
.final-emoji { font-size: 72px; margin-bottom: 16px; }
.final-title { font-size: 28px; font-weight: 800; color: #212529; margin-bottom: 12px; }
.final-msg { font-size: 16px; color: #6c757d; line-height: 1.6; margin-bottom: 24px; }
.final-stats { display: flex; justify-content: center; gap: 32px; margin-bottom: 24px; flex-wrap: wrap; }
.final-stat { text-align: center; }
.final-stat-val { font-size: 36px; font-weight: 800; background: linear-gradient(135deg,#f093fb,#f5576c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.final-stat-label { font-size: 12px; color: #adb5bd; text-transform: uppercase; letter-spacing: 1px; }
.restart-btn { padding: 14px 40px; background: linear-gradient(135deg,#f093fb,#f5576c); color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; margin-bottom: 12px; }
.restart-btn:hover { transform: scale(1.05); }
@media(max-width:500px){ .container{border-radius:16px} .header{padding:20px} .header h1{font-size:22px} .question-text{font-size:17px} .card-area{padding:20px} .stats{padding:12px 16px;font-size:12px} .answer-btn{font-size:14px;padding:12px 14px} }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="mascot">🦉</div>
    <h1>The Questionarium</h1>
    <p>Where wondering is the whole point</p>
  </div>
  <div class="stats">
    <div class="stat"><span class="stat-icon">🧠</span> <span id="score">0</span> thoughts thunk</div>
    <div class="stat"><span class="stat-icon">🎯</span> #<span id="qnum">1</span> of <span id="qtotal">8</span></div>
  </div>
  <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div></div>
  <div class="card-area" id="cardArea"></div>
  <div class="skip-area"><button class="skip-btn" onclick="skipQuestion()">Skip this one →</button></div>
</div>
<script>
// ── Audio Engine ────────────────────────────────────────────────────────────
// AUTO-DETECT: tries pre-generated edge-tts MP3s first.
// If they exist (200ms load test), uses Andrew's voice.
// Otherwise falls back to browser speech synthesis.
// To bake in Andrew: run generate_questionarium_audio.py once, then deploy
// the audio/ folder alongside this HTML.

const AUDIO_DIR = "audio/";
let audioMode = null; // "mp3" or "browser"
let currentAudio = null;

async function detectAudioMode() {
  // Quick test: does audio/q0_q.mp3 load?
  try {
    const resp = await fetch(AUDIO_DIR + "q0_q.mp3", { method: "HEAD" });
    if (resp.ok) {
      audioMode = "mp3";
      console.log("🎙️ Using Andrew's voice (pre-generated MP3s)");
      return;
    }
  } catch(e) {}
  audioMode = "browser";
  console.log("🔊 Using browser speech (MP3s not found — run generate_questionarium_audio.py to bake in Andrew)");
}

function speak(filename, textFallback) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (audioMode === "mp3" && filename) {
    const a = new Audio(AUDIO_DIR + filename);
    currentAudio = a;
    a.play().catch(() => {});
    a.onended = () => { currentAudio = null; };
    return a;
  }
  // Browser fallback
  if ('speechSynthesis' in window && textFallback) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(textFallback);
    u.rate = 0.9; u.pitch = 1.05;
    const voices = speechSynthesis.getVoices();
    const good = voices.find(v => v.name.includes('Google') || v.name.includes('Natural') || v.name.includes('Daniel'));
    if (good) u.voice = good;
    u.onend = () => { currentAudio = null; };
    speechSynthesis.speak(u);
  }
}

// ── Scenarios ───────────────────────────────────────────────────────────────
const scenarios = [
  {category:"FAIRNESS LAB",
   question:"A wizard offers to make you THE BEST at everything... but everyone else in the world becomes slightly worse at everything they do. Do you take the deal?",
   answers:[
     {letter:"A",text:"Take the deal! Being the best at everything sounds amazing.",reaction:"🌟",title:"The Champion",msg:"You know what you want and you go for it. That's powerful.",thought:"If everyone else got worse, would 'the best' still mean anything? Is being great only special because other people are great too?"},
     {letter:"B",text:"No way. I don't want to make everyone else worse just so I can shine.",reaction:"💛",title:"The Big Heart",msg:"You care about other people, even strangers. That's a superpower all by itself.",thought:"Would it still be the right choice if one of those people was your best friend? What if it was someone you don't like?"},
     {letter:"C",text:"Can I be the best at just ONE thing instead? Like, really good at making pizza?",reaction:"🍕",title:"The Negotiator",msg:"You found a third option! That's what philosophers do — question the question itself.",thought:"Why did the wizard only give two choices? In real life, are most choices really just A or B?"},
     {letter:"D",text:"What does 'best' even MEAN if everyone else got worse? That's not being best, that's just everyone else being worse.",reaction:"🔍",title:"The Word Detective",msg:"You looked at the words themselves before answering.",thought:"How many arguments happen because people mean different things by the same word? Fair. Best. Good. What do those even mean?"}
   ]},
  {category:"REALITY CHECK",
   question:"Your friend says they have an invisible pet dragon. It can breathe fire... but the fire is ALSO invisible. How would you figure out if the dragon is actually real?",
   answers:[
     {letter:"A",text:"Try to touch it! If I can feel it, it's real, even if I can't see it.",reaction:"🖐️",title:"The Hands-On Thinker",msg:"You trust what you can touch and feel. That's called empiricism!",thought:"But what about things you can't touch, like gravity or love or thoughts? Are those real?"},
     {letter:"B",text:"Throw water on it! If there's an invisible dragon, the water would splash on SOMETHING.",reaction:"💦",title:"The Experiment Designer",msg:"You invented a test! That's what scientists do — look for evidence.",thought:"What if the dragon was also waterproof? How many tests before you'd decide it wasn't real?"},
     {letter:"C",text:"If you can't prove it's NOT real... maybe it IS real? I believe my friend.",reaction:"🤝",title:"The Trust Builder",msg:"You chose to believe your friend. Trust is one of the most important things humans have.",thought:"But should we always believe people we trust? What if your friend truly believes the dragon is real — does that make it real?"},
     {letter:"D",text:"What if the dragon only exists when someone is thinking about it? Like, it's real in our imagination?",reaction:"🌈",title:"The Dream Weaver",msg:"You're asking whether something can be real in one way but not another.",thought:"Is a story real? Is a dream real? Is a feeling real? Are there different kinds of real?"}
   ]},
  {category:"HAPPINESS DILEMMA",
   question:"If you could press a button that makes EVERYONE happy forever... but nobody could EVER change their mind about ANYTHING again. Would you press it?",
   answers:[
     {letter:"A",text:"Press it! Happy forever for everyone sounds like the best possible world.",reaction:"😊",title:"The Joy Maximizer",msg:"You want everyone to be happy. That's beautiful.",thought:"But if nobody can change their mind, how would we learn new things? Would we be stuck with whatever we believed on button-press day forever?"},
     {letter:"B",text:"DON'T press it. Changing your mind is how you grow. Being stuck forever sounds like a prison.",reaction:"🌱",title:"The Growth Mind",msg:"You value freedom and growth over comfort. That's brave.",thought:"Is happiness worth anything if you didn't choose it? If a robot makes you smile by zapping your brain, is that real happiness?"},
     {letter:"C",text:"Can I press it HALFWAY? Everybody gets a happiness boost but can still learn and grow?",reaction:"⚖️",title:"The Balance Finder",msg:"You want both! Happiness AND growth. You're looking for the middle path.",thought:"Are there things in life where you can't have both? Times when you have to choose between feeling good and doing the right thing?"},
     {letter:"D",text:"Are people REALLY happy if they can't choose to be sad? Maybe you need sad to understand happy.",reaction:"🌓",title:"The Deep Diver",msg:"You asked whether happiness makes sense without sadness.",thought:"Can you know what warm means if you've never felt cold? What if ALL feelings need their opposite to make sense?"}
   ]},
  {category:"FRIENDSHIP LAB",
   question:"Your BEST FRIEND moves away. You get a robot that looks and acts EXACTLY like them. Is the robot actually your friend?",
   answers:[
     {letter:"A",text:"Yes! If they act the same and make me feel the same, then they ARE the same.",reaction:"🤖",title:"The Practical Pal",msg:"You care about what something DOES, not what it's made of.",thought:"But what if you found out your REAL best friend had been replaced by a robot and you never knew? Would it matter?"},
     {letter:"B",text:"No. A real friend has to be a real PERSON, with their own thoughts and feelings.",reaction:"❤️",title:"The Authentic Friend",msg:"For you, friendship needs something deeper than just acting right.",thought:"How do you know OTHER PEOPLE have real thoughts? You can't see inside their heads."},
     {letter:"C",text:"The robot is a DIFFERENT kind of friend. Like how a pet is different from a person friend.",reaction:"🐕",title:"The Category Maker",msg:"You invented a whole new category! Not friend or not-friend — a third thing.",thought:"How many things in life are either-or versus a different kind of thing entirely?"},
     {letter:"D",text:"Can I have BOTH friends? The real one for real talks and the robot one for everyday hanging out?",reaction:"🎉",title:"The Abundance Thinker",msg:"Why choose when you can have both?",thought:"Is love limited? If you love a second person, do you love the first one less? Or does love multiply?"}
   ]},
  {category:"IDENTITY PUZZLE",
   question:"You bury your favorite sneaker in the backyard. You dig it up 10 YEARS later — dirty, faded, full of holes. Is it the SAME sneaker or a DIFFERENT one?",
   answers:[
     {letter:"A",text:"Same sneaker! It's made of the exact same atoms. Nothing was added or removed.",reaction:"👟",title:"The Atom Counter",msg:"You believe what something IS comes down to what it's MADE OF.",thought:"But humans replace almost ALL their atoms every few years. Are you a different person than 7 years ago?"},
     {letter:"B",text:"It's a DIFFERENT sneaker. It changed over time. Things are defined by what they're like RIGHT NOW.",reaction:"⏳",title:"The Present Focuser",msg:"You care about what something is in THIS moment.",thought:"If you're different now than as a baby, are you a different person? When did baby-you become now-you?"},
     {letter:"C",text:"It's BOTH. Same sneaker, different CONDITION. Like how you're the same person even when you change.",reaction:"🔄",title:"The Both-And Thinker",msg:"You found a way to hold two truths at once. Not a contradiction!",thought:"What ELSE in life is 'both'? Are you the same person you were yesterday AND a different one?"},
     {letter:"D",text:"NEITHER. The REAL sneaker is the MEMORY of wearing it. Physical stuff was never what made it yours.",reaction:"💭",title:"The Meaning Maker",msg:"What makes something important isn't atoms — it's what it MEANS to you.",thought:"If meaning is what matters, does anything have meaning without someone to care about it?"}
   ]},
  {category:"SECRETS AND PROMISES",
   question:"A GIANT CHICKEN lands in your yard. It'll lay GOLDEN EGGS for you forever... but ONLY if you NEVER tell ANYONE. Not even your family. Ever. Deal?",
   answers:[
     {letter:"A",text:"YES! I'd be rich forever and all I have to do is keep one secret. GREAT deal!",reaction:"💰",title:"The Deal Maker",msg:"You saw an opportunity and took it.",thought:"But would you feel lonely having a secret that big? Can't share your amazing life... is it still amazing?"},
     {letter:"B",text:"NO. I can't keep a secret that big from my family. Some things matter more than gold.",reaction:"👨‍👩‍👧",title:"The Family First",msg:"You chose connection over riches.",thought:"Are there ANY secrets worth keeping from people you love? What makes some secrets okay and others not?"},
     {letter:"C",text:"Wait — the CHICKEN said I can't tell. But what if the chicken tells people? Loophole!",reaction:"🐔",title:"The Loophole Finder",msg:"You read the fine print! Lawyers AND philosophers examine the exact words.",thought:"Is following the exact words of a rule the same as doing what the rule MEANT?"},
     {letter:"D",text:"What would I even DO with infinite golden eggs? That sounds like a storage problem.",reaction:"🥚",title:"The Practical Questioner",msg:"You looked past the fantasy: what would this ACTUALLY be like?",thought:"We dream of infinite money — but would infinite anything actually make us happy?"}
   ]},
  {category:"TRUST PUZZLE",
   question:"Your teacher says 2+2=4. Your calculator says 2+2=4. But a VOICE IN YOUR HEAD says 2+2=5. Who do you trust?",
   answers:[
     {letter:"A",text:"My teacher! They went to school for YEARS to learn math. Experts know things.",reaction:"👩‍🏫",title:"The Trust Builder",msg:"You trust experts. That's smart — society works because we trust people who know more.",thought:"But what if your teacher was wrong about something else? When should you question experts?"},
     {letter:"B",text:"My calculator! Machines don't make mistakes. They're programmed to be correct.",reaction:"🔢",title:"The Tech Truster",msg:"You trust tools built for accuracy. Makes sense!",thought:"But who programmed the calculator? A human. Can you trust a tool without knowing how it works?"},
     {letter:"C",text:"MYSELF! I have to trust my own brain. If I don't believe what I think, what CAN I believe?",reaction:"🧠",title:"The Self Truster",msg:"You believe in your own mind. That's courageous.",thought:"But have you ever been SURE about something and then found out you were wrong?"},
     {letter:"D",text:"I wouldn't trust ANY of them. I'd get FOUR ACTUAL APPLES and count them myself.",reaction:"🍎",title:"The Evidence Seeker",msg:"You went straight to the evidence! That's the scientific method.",thought:"What if you can't test something yourself? How do you decide what's true when you can't check?"}
   ]},
  {category:"SUPERPOWER DILEMMA",
   question:"You can PAUSE TIME whenever you want. BUT... while time is paused, ICE CREAM has NO TASTE. Do you still take the power?",
   answers:[
     {letter:"A",text:"YES! I'd use it for stuff other than eating. Frozen time beats ice cream.",reaction:"⏸️",title:"The Strategist",msg:"You saw the big picture. Minor downside, amazing power.",thought:"But what if using the power made you lonely? The only moving person in a frozen world..."},
     {letter:"B",text:"NO. What's the point of superpowers if you can't enjoy ICE CREAM? Dealbreaker.",reaction:"🍦",title:"The Joy Defender",msg:"You know what you love and won't give it up. Joy isn't negotiable.",thought:"Where's your line? All food has no taste but you can fly? Time-freeze but no music ever again?"},
     {letter:"C",text:"I'd only pause time to take NAPS. Naps don't need taste. Checkmate, ice cream curse!",reaction:"😴",title:"The Workaround Wizard",msg:"You dodged the downside entirely. That's creative problem-solving.",thought:"Are most impossible choices hiding a third option we just haven't seen yet?"},
     {letter:"D",text:"Can I FAST-FORWARD time instead? Skipping homework sounds WAY better than pausing.",reaction:"⏩",title:"The Reframer",msg:"You didn't answer — you changed the question. That's a whole different superpower.",thought:"If you could skip all boring parts of life, would you? Or are boring parts secretly where important stuff happens?"}
   ]}
];

let currentQuestion = 0, score = 0;
const total = scenarios.length;

// ── Render ──────────────────────────────────────────────────────────────────
function init() {
  currentQuestion = 0; score = 0;
  document.getElementById('score').textContent = '0';
  document.getElementById('qnum').textContent = '1';
  document.getElementById('qtotal').textContent = total;
  document.getElementById('progress').style.width = '0%';
  renderQuestion();
  const qi = 0;
  setTimeout(() => speak(`q${qi}_cat.mp3`, scenarios[0].category), 400);
  setTimeout(() => speak(`q${qi}_q.mp3`, scenarios[0].question), 2200);
}

function renderQuestion() {
  if (currentQuestion >= total) return showFinal();
  const s = scenarios[currentQuestion], qi = currentQuestion;
  document.getElementById('qnum').textContent = qi + 1;
  document.getElementById('progress').style.width = ((qi/total)*100)+'%';

  const voiceLabel = audioMode === "mp3" ? '<span class="voice-badge">🎙️ Andrew</span>' : '<span class="voice-badge">🔊 Browser</span>';

  document.getElementById('cardArea').innerHTML = `
    <div class="scenario-label" onclick="speak('q${qi}_cat.mp3','${s.category.replace(/'/g,"\\'")}')" style="cursor:pointer">${voiceLabel} ${s.category}</div>
    <div class="question-text" onclick="speak('q${qi}_q.mp3','${s.question.replace(/'/g,"\\'")}')">${s.question}<div class="speaker-hint">🔊 Click to hear aloud</div></div>
    <div class="answers">${s.answers.map((a,i)=>`
      <button class="answer-btn" onclick="pickAnswer(${i})">
        <span class="answer-letter">${a.letter}</span>
        <span>${a.text}</span>
        <button class="speaker-mini" onclick="event.stopPropagation();speak('q${qi}_a${i}_text.mp3','${a.text.replace(/'/g,"\\'")}')" title="Hear aloud">🔊</button>
      </button>`).join('')}</div>`;
}

function pickAnswer(i) {
  const qi = currentQuestion;
  const a = scenarios[qi].answers[i];
  score++;
  document.getElementById('score').textContent = score;
  document.getElementById('progress').style.width = (((qi+1)/total)*100)+'%';

  speak(`q${qi}_a${i}_msg.mp3`, a.msg);
  setTimeout(() => speak(`q${qi}_a${i}_thought.mp3`, a.thought), 4000);

  document.getElementById('cardArea').innerHTML = `
    <div class="reaction-card">
      <div class="reaction-emoji">${a.reaction}</div>
      <div class="reaction-title">${a.title}</div>
      <div class="reaction-msg" onclick="speak('q${qi}_a${i}_msg.mp3','${a.msg.replace(/'/g,"\\'")}')">🔊 ${a.msg}</div>
      <div class="reaction-thought" onclick="speak('q${qi}_a${i}_thought.mp3','${a.thought.replace(/'/g,"\\'")}')">🔊 💡 ${a.thought}</div>
      <button class="continue-btn" onclick="nextQuestion()">${qi<total-1?'Next Question →':'See My Results 🎉'}</button>
    </div>`;
}

function skipQuestion() { currentQuestion++; if(currentQuestion>=total)showFinal(); else renderQuestion(); }
function nextQuestion() {
  currentQuestion++;
  if (currentQuestion >= total) return showFinal();
  renderQuestion();
  const qi = currentQuestion, s = scenarios[qi];
  setTimeout(() => speak(`q${qi}_cat.mp3`, s.category), 300);
  setTimeout(() => speak(`q${qi}_q.mp3`, s.question), 1800);
}

function showFinal() {
  document.getElementById('progress').style.width = '100%';
  document.getElementById('qnum').textContent = total;
  const msgs = [
    "You just did something most grown-ups forget how to do. You asked questions — not to find the one right answer, but to explore what's possible. Keep doing that forever.",
    "Every great scientist, every great artist, every great human started exactly where you are right now: wondering. Never stop.",
    "The most powerful sentence in the world isn't 'I know.' It's 'I wonder.' And you just proved you're a wonder champion."
  ];
  document.getElementById('cardArea').innerHTML = `
    <div class="final-card">
      <div class="final-emoji">${['🌈','🦄','🎉','💫','🌟','✨'][Math.floor(Math.random()*6)]}</div>
      <div class="final-title">You're a Certified Wonderer!</div>
      <div class="final-msg">${msgs[Math.floor(Math.random()*3)]}</div>
      <div class="final-stats">
        <div class="final-stat"><div class="final-stat-val">${score}</div><div class="final-stat-label">Questions Explored</div></div>
        <div class="final-stat"><div class="final-stat-val">∞</div><div class="final-stat-label">New Questions Created</div></div>
      </div>
      <button class="restart-btn" onclick="init()">Play Again 🔄</button>
    </div>`;
}

// ── Boot ────────────────────────────────────────────────────────────────────
if ('speechSynthesis' in window) { speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices(); }
detectAudioMode().then(init);
</script>
</body>
</html>
